name: convert-notebooks-to-markdown

on:
  push:
    branches: [dev]
    paths: ['notebooks/*.ipynb']  # Triggers when a .ipynb file is added or modified
  workflow_run:
    branches: [dev]
    workflows: ["move-notebooks-to-folder"]
    types: [completed]

jobs:
  convert:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install nbconvert jupyter

      - name: Filter notebook cells (pip installs + Colab boilerplate)
        run: |
          python3 - <<'PYEOF'
          import json, glob, sys

          # Patterns that mark a cell as boilerplate to remove
          COLAB_PATTERNS = [
              'from google.colab import',
              'drive.mount(',
              'auth.authenticate_user',
              'google.colab.kernel.invokeFunction',
              '# @title',
              '# @param',
          ]

          def is_boilerplate(cell):
              src = ''.join(cell.get('source', []))
              stripped = src.strip()

              # Remove pip / conda install cells
              if cell.get('cell_type') == 'code':
                  if (stripped.startswith('!pip') or
                      stripped.startswith('%pip') or
                      stripped.startswith('!conda') or
                      stripped.startswith('%conda')):
                      return True

              # Remove Colab-specific cells (code or markdown)
              for pattern in COLAB_PATTERNS:
                  if pattern in src:
                      return True

              return False

          for nb_path in glob.glob('notebooks/*.ipynb'):
              with open(nb_path, encoding='utf-8') as f:
                  nb = json.load(f)

              before = len(nb['cells'])
              nb['cells'] = [c for c in nb['cells'] if not is_boilerplate(c)]
              removed = before - len(nb['cells'])

              with open(nb_path, 'w', encoding='utf-8') as f:
                  json.dump(nb, f, indent=1, ensure_ascii=False)

              print(f"  {nb_path}: removed {removed} boilerplate cell(s), {len(nb['cells'])} remaining")
          PYEOF

      - name: Convert notebooks to Markdown and add front matter
        run: |
          final_folder="_posts"
          mkdir -p "$final_folder"

          for notebook in $(find notebooks -name '*.ipynb'); do

              # --- Sanitise filename ---
              sanitized=$(basename "$notebook" .ipynb | sed 's/[^a-zA-Z0-9]/_/g')
              date=$(date '+%Y-%m-%d')
              output_file="$final_folder/${date}-${sanitized}.md"

              echo "Processing: $notebook → $output_file"

              # --- Convert to Markdown ---
              jupyter nbconvert --to markdown "$notebook"
              markdown_file="${notebook%.ipynb}.md"
              markdown_file=$(echo "$markdown_file" | sed 's/\\/\//g')

              if [ ! -f "$markdown_file" ]; then
                  echo "Error: conversion failed for $notebook"
                  exit 1
              fi

              # --- Derive title from filename (not first heading) ---
              raw_name=$(basename "$notebook" .ipynb)
              title=$(python3 - <<PYEOF
          import re, sys
          name = """$raw_name"""
          # Strip leading date patterns like 2025-05-15- or 01_
          name = re.sub(r'^\d{4}-\d{2}-\d{2}[-_]', '', name)
          name = re.sub(r'^\d+[-_]', '', name)
          # Replace separators and title-case
          title = name.replace('_', ' ').replace('-', ' ').title()
          print(title)
          PYEOF
          )

              # --- Assemble post with front matter ---
              {
                echo '---'
                echo "layout: post"
                echo "title: \"$title\""
                echo "date: $date"
                echo "tags: []"
                echo '---'
                echo
                cat "$markdown_file"
              } > "$output_file"

              echo "Created: $output_file (title: $title)"
          done

      - name: Commit and push
        run: |
          git config --local user.name  "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"

          added_files=$(git ls-files --others --exclude-standard _posts/*.md)
          modified_files=$(git diff --name-only _posts/*.md)

          total_added=0
          total_modified=0
          commit_message=""

          get_version() {
              echo $(( $(git log --oneline -- "$1" | wc -l) + 1 ))
          }

          for file in $added_files; do
              [ -n "$file" ] || continue
              total_added=$(( total_added + 1 ))
              commit_message+="New: $file (v$(get_version $file)) at $(date +"%Y-%m-%d %H:%M:%S")\n"
          done

          for file in $modified_files; do
              [ -n "$file" ] || continue
              total_modified=$(( total_modified + 1 ))
              commit_message+="Updated: $file (v$(get_version $file)) at $(date +"%Y-%m-%d %H:%M:%S")\n"
          done

          if [ $(( total_added + total_modified )) -gt 0 ]; then
              summary="Notebooks → Markdown: $total_added added, $total_modified updated"
              git add $added_files $modified_files
              git commit -m "$summary

          $commit_message"
              git push origin dev
          else
              echo "Nothing to commit."
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
