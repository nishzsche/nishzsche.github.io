<!DOCTYPE html>
<html lang="en-us">

  {% include head.html %}

  <body>
    <div class="container">

      <nav class="site-nav">
        <a class="site-title" href="{{ site.baseurl }}/">{{ site.title }}</a>
        <div class="nav-links">
          <a href="{{ site.baseurl }}/about">About</a>
          <a href="{{ site.baseurl }}/atom.xml">Feed</a>
        </div>
      </nav>

      {% if page.url == "/" %}
      <p class="site-tagline">{{ site.tagline }}</p>
      {% endif %}

      {{ content }}

      <footer class="site-footer">
        &copy; {{ site.time | date: '%Y' }} {{ site.author.name }}
        &middot; <a href="{{ site.author.url }}">@nishzsche</a>
        &middot; <a href="{{ site.baseurl }}/atom.xml">RSS</a>
      </footer>

    </div>

    <script type="text/x-mathjax-config">
      MathJax.Hub.Config({
        tex2jax: {
          inlineMath: [['$','$'], ['\\(','\\)']],
          processEscapes: true
        }
      });
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.0/MathJax.js?config=TeX-AMS-MML_HTMLorMML" type="text/javascript"></script>

  </body>
</html>
